
upstream codanium_app {
    server app:3000;
    keepalive 32;
}

# ─── HTTP → HTTPS redirect ───
server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS: Landing (codanium.com) ───
server {
    listen 443 ssl;
    server_name codanium.com www.codanium.com;

    ssl_certificate     /etc/letsencrypt/live/codanium.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codanium.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    proxy_read_timeout  60s;
    proxy_send_timeout  60s;
    proxy_connect_timeout 10s;

    location / {
        proxy_pass         http://codanium_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── HTTPS: Platform (app.codanium.com) ───
server {
    listen 443 ssl;
    server_name app.codanium.com;

    ssl_certificate     /etc/letsencrypt/live/codanium.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codanium.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    proxy_read_timeout  300s;
    proxy_send_timeout  300s;
    proxy_connect_timeout 10s;

    location / {
        proxy_pass         http://codanium_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass         http://codanium_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }
}
