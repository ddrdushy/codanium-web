name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Codanium Platform
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GH_TOKEN
          command_timeout: 10m
          script: |
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "=== Installing Docker ==="
              curl -fsSL https://get.docker.com | sh
              apt-get update && apt-get install -y docker-compose-plugin git
            fi

            # Clone repo on first deploy
            if [ ! -d /opt/codanium ]; then
              echo "=== Cloning repository ==="
              git clone https://x-access-token:${GH_TOKEN}@github.com/AiSenseiMY/Ai-Team_studio.git /opt/codanium
              cd /opt/codanium
              cp .env.example .env
            fi

            echo "=== Pulling latest code ==="
            cd /opt/codanium
            git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/AiSenseiMY/Ai-Team_studio.git
            git pull origin main

            echo "=== Setting production .env ==="
            cat > .env << 'ENVEOF'
            DATABASE_URL=postgresql://ats_user:ats_secret_2025@db:5432/ai_team_studio?schema=public
            REDIS_URL=redis://redis:6379
            NEXTAUTH_URL=https://codanium.com
            NEXTAUTH_SECRET=codanium-prod-secret-2026-x9k2m
            AUTH_SECRET=codanium-prod-secret-2026-x9k2m
            AUTH_TRUST_HOST=true
            APP_URL=https://codanium.com
            NODE_ENV=production
            LLM_ENCRYPTION_KEY=codanium-llm-enc-2026-stable-k3y9x7m2p
            ENVEOF
            sed -i 's/^            //' .env

            echo "=== Building containers ==="
            docker compose build --no-cache

            echo "=== Starting services ==="
            docker compose up -d

            echo "=== Waiting for DB to be healthy ==="
            sleep 10

            echo "=== Running database migrations ==="
            docker compose exec -T app npx prisma migrate deploy || \
              docker compose exec -T app npx prisma db push --accept-data-loss

            echo "=== Seeding database (first deploy only) ==="
            USER_COUNT=$(docker compose exec -T db psql -U ats_user -d ai_team_studio -t -A -c "SELECT COUNT(*) FROM users;" 2>/dev/null || echo "0")
            if [ "$USER_COUNT" -lt "2" ]; then
              echo "  No users found — running seed..."
              docker compose exec -T app npx prisma db seed || echo "  Seed failed (non-critical)"
            else
              echo "  Database already has $USER_COUNT users — skipping seed"
            fi

            echo "=== Restarting app + nginx ==="
            docker compose restart app
            sleep 5
            docker compose restart nginx
            sleep 3

            echo "=== Verifying site is up ==="
            curl -s -o /dev/null -w "%{http_code}" http://localhost || true

            echo ""
            echo "=== Final status ==="
            docker compose ps
            echo "=== Deployment complete ==="
