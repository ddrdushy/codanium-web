name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Codanium Platform
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GH_TOKEN
          command_timeout: 10m
          script: |
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "=== Installing Docker ==="
              curl -fsSL https://get.docker.com | sh
              apt-get update && apt-get install -y docker-compose-plugin git
            fi

            # Clone repo on first deploy
            if [ ! -d /opt/codanium ]; then
              echo "=== Cloning repository ==="
              git clone https://x-access-token:${GH_TOKEN}@github.com/AiSenseiMY/Ai-Team_studio.git /opt/codanium
              cd /opt/codanium
              cp .env.example .env
            fi

            echo "=== Pulling latest code ==="
            cd /opt/codanium
            git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/AiSenseiMY/Ai-Team_studio.git
            git pull origin main

            echo "=== Building containers ==="
            docker compose build --no-cache

            echo "=== Starting services ==="
            docker compose up -d

            echo "=== Waiting for DB to be healthy ==="
            sleep 10

            echo "=== Running database migrations ==="
            docker compose exec -T app npx prisma migrate deploy || \
              docker compose exec -T app npx prisma db push --accept-data-loss

            echo "=== Seeding database ==="
            docker compose exec -T app npx prisma db seed || echo "Seed skipped (may already exist)"

            echo "=== Restarting app with fresh schema ==="
            docker compose restart app
            sleep 5

            echo "=== Final status ==="
            docker compose ps
            echo "=== Deployment complete ==="
