name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Codanium Platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "=== Installing Docker ==="
              curl -fsSL https://get.docker.com | sh
              apt-get update && apt-get install -y docker-compose-plugin git
            fi

            # Clone repo on first deploy
            if [ ! -d /opt/codanium ]; then
              echo "=== Cloning repository ==="
              git clone https://github.com/AiSenseiMY/Ai-Team_studio.git /opt/codanium
              cd /opt/codanium
              cp .env.example .env
            fi

            echo "=== Pulling latest code ==="
            cd /opt/codanium
            git pull origin main

            echo "=== Building and deploying ==="
            docker compose build --no-cache
            docker compose up -d

            echo "=== Checking status ==="
            docker compose ps
            echo "=== Deployment complete ==="
