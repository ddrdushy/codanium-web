name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Codanium Platform
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GH_TOKEN
          command_timeout: 10m
          script: |
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              apt-get update && apt-get install -y docker-compose-plugin git
            fi

            if [ ! -d /opt/codanium ]; then
              git clone https://x-access-token:${GH_TOKEN}@github.com/AiSenseiMY/Ai-Team_studio.git /opt/codanium
            fi

            echo "=== Pulling latest code ==="
            cd /opt/codanium
            git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/AiSenseiMY/Ai-Team_studio.git
            git checkout -- .
            git clean -fd -e .env -e node_modules -e workspaces
            git pull origin main

            echo "=== Setting production .env ==="
            cat > .env << 'ENVEOF'
            DATABASE_URL=postgresql://ats_user:ats_secret_2025@db:5432/ai_team_studio?schema=public
            REDIS_URL=redis://redis:6379
            NEXTAUTH_URL=https://app.codanium.com
            NEXTAUTH_SECRET=codanium-prod-secret-2026-x9k2m
            AUTH_SECRET=codanium-prod-secret-2026-x9k2m
            AUTH_TRUST_HOST=true
            APP_URL=https://app.codanium.com
            NODE_ENV=production
            LLM_ENCRYPTION_KEY=codanium-llm-enc-2026-stable-k3y9x7m2p
            ENVEOF
            sed -i 's/^            //' .env

            echo "=== Stopping all containers ==="
            docker compose down --remove-orphans || true
            docker rm -f ats-app ats-app-blue ats-app-green ats-landing 2>/dev/null || true

            echo "=== Building images ==="
            docker compose build --no-cache

            echo "=== Starting all services ==="
            docker compose up -d

            echo "=== Waiting for services ==="
            sleep 15

            echo "=== Running database migrations ==="
            docker compose exec -T app npx prisma migrate deploy 2>/dev/null || \
              docker compose exec -T app npx prisma db push --accept-data-loss 2>/dev/null || true

            echo "=== Seeding database (first deploy only) ==="
            USER_COUNT=$(docker compose exec -T db psql -U ats_user -d ai_team_studio -t -A -c "SELECT COUNT(*) FROM users;" 2>/dev/null || echo "0")
            if [ "$USER_COUNT" -lt "2" ]; then
              docker compose exec -T app npx prisma db seed || echo "Seed failed (non-critical)"
            else
              echo "Database has $USER_COUNT users — skipping seed"
            fi

            echo "=== Issuing SSL certificate ==="
            # Use standalone certbot with docker (not compose) to avoid volume issues
            timeout 120 docker run --rm \
              -v codanium_certbot_www:/var/www/certbot \
              -v codanium_certbot_conf:/etc/letsencrypt \
              certbot/certbot:latest certonly --webroot \
              -w /var/www/certbot \
              -d codanium.com -d www.codanium.com -d app.codanium.com \
              --email admin@codanium.com --agree-tos --no-eff-email \
              --force-renewal --non-interactive 2>&1 \
              && echo "Certbot: success" \
              || echo "Certbot: skipped or failed (non-critical)"

            echo "=== Checking for SSL cert ==="
            if docker compose exec -T nginx test -f /etc/letsencrypt/live/codanium.com/fullchain.pem 2>/dev/null; then
              echo "  Cert found — enabling HTTPS"
              cp nginx-ssl.conf nginx.conf
              echo "  Testing nginx config..."
              docker compose exec -T nginx nginx -t 2>&1 || echo "  WARN: nginx config test failed"
              echo "  Restarting nginx with SSL..."
              docker compose restart nginx
              sleep 3
              docker compose exec -T nginx nginx -t 2>&1
              echo "  Nginx restarted"
            else
              echo "  No cert — site serves over HTTP only"
            fi

            echo "=== Health checks ==="
            LANDING=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:14005/ 2>/dev/null || echo "000")
            echo "  Landing: $LANDING"
            APP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:14001/api/health 2>/dev/null || echo "000")
            echo "  App: $APP"

            echo ""
            echo "=== Final status ==="
            docker compose ps
            echo "=== Deployment complete ==="
