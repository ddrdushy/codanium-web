# ─── AI Team Studio — Docker Compose ───
# PostgreSQL + Redis + Next.js App + BullMQ Worker

services:
  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: ats-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ats_user
      POSTGRES_PASSWORD: ats_secret_2025
      POSTGRES_DB: ai_team_studio
    ports:
      - "14000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ats_user -d ai_team_studio"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis (Cache, Queue, Pub/Sub) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ats-redis
    restart: unless-stopped
    ports:
      - "14003:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Next.js Application ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ats-app
    restart: unless-stopped
    ports:
      - "14001:3000"
    volumes:
      - ./workspaces:/app/workspaces    # Sync generated files to local filesystem
    environment:
      DATABASE_URL: postgresql://ats_user:ats_secret_2025@db:5432/ai_team_studio?schema=public
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:14001
      NEXTAUTH_SECRET: docker-dev-secret-change-in-production
      AUTH_SECRET: docker-dev-secret-change-in-production
      AUTH_TRUST_HOST: "true"
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      APP_URL: http://localhost:14001
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── BullMQ Worker (Background Job Processor) ───────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ats-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ats_user:ats_secret_2025@db:5432/ai_team_studio?schema=public
      REDIS_URL: redis://redis:6379
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      APP_URL: http://localhost:14001
      NODE_ENV: production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker for code execution sandbox
      - ./workspaces:/app/workspaces    # Sync generated files to local filesystem
    command: ["node", "worker.mjs"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Prisma Studio (Dev Only) ────────────────────────────────────────────────
  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: ats-prisma-studio
    profiles:
      - dev
    ports:
      - "14002:5555"
    environment:
      DATABASE_URL: postgresql://ats_user:ats_secret_2025@db:5432/ai_team_studio?schema=public
    command: npx prisma studio --port 5555 --browser none
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
