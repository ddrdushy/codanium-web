# ─── Codanium Platform — Docker Compose (Blue-Green Deploy) ───
# Nginx + PostgreSQL + Redis + 2x Next.js App (blue/green) + BullMQ Worker

x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  volumes:
    - ./workspaces:/app/workspaces
  environment: &app-env
    DATABASE_URL: postgresql://ats_user:ats_secret_2025@db:5432/ai_team_studio?schema=public
    REDIS_URL: redis://redis:6379
    NEXTAUTH_URL: ${NEXTAUTH_URL:-https://codanium.com}
    NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-docker-dev-secret-change-in-production}
    AUTH_SECRET: ${AUTH_SECRET:-docker-dev-secret-change-in-production}
    AUTH_TRUST_HOST: "true"
    SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
    STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
    STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
    STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
    STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
    APP_URL: ${APP_URL:-https://codanium.com}
    NODE_ENV: production
    LLM_ENCRYPTION_KEY: ${LLM_ENCRYPTION_KEY:-}
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ─── Nginx Reverse Proxy (load-balances blue + green) ────────────────────────
  nginx:
    image: nginx:alpine
    container_name: codanium-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - app-blue
      - app-green

  # ─── Certbot (SSL cert issuance + auto-renewal) ──────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: codanium-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"

  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: ats-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ats_user
      POSTGRES_PASSWORD: ats_secret_2025
      POSTGRES_DB: ai_team_studio
    ports:
      - "14000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ats_user -d ai_team_studio"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis (Cache, Queue, Pub/Sub) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ats-redis
    restart: unless-stopped
    ports:
      - "14003:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Next.js App (Blue instance) ─────────────────────────────────────────────
  app-blue:
    <<: *app-common
    container_name: ats-app-blue
    ports:
      - "14001:3000"

  # ─── Next.js App (Green instance) ────────────────────────────────────────────
  app-green:
    <<: *app-common
    container_name: ats-app-green
    ports:
      - "14004:3000"

  # ─── BullMQ Worker (Background Job Processor) ───────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ats-worker
    restart: unless-stopped
    environment:
      <<: *app-env
      APP_URL: http://app-blue:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workspaces:/app/workspaces
    command: ["node", "worker.mjs"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Prisma Studio (Dev Only) ────────────────────────────────────────────────
  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: ats-prisma-studio
    profiles:
      - dev
    ports:
      - "14002:5555"
    environment:
      DATABASE_URL: postgresql://ats_user:ats_secret_2025@db:5432/ai_team_studio?schema=public
    command: npx prisma studio --port 5555 --browser none
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  certbot_www:
    driver: local
  certbot_conf:
    driver: local
